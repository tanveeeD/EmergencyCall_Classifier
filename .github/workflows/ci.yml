name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies and dry run tests
        run: |
          pip install flake8 pytest
          # flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test Docker Compose Build
        run: |
          docker compose build

      - name: Trigger Render Deployment
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is empty! Add it in GitHub Settings to enable auto-deploy. Skipping."
          else
            curl -X POST "$RENDER_HOOK"
          fi
