services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: emergency-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    networks:
      - emer-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emergency-frontend
    ports:
      - "5000:5000"
    environment:
      - BACKEND_URL=http://emergency-backend:8000
    depends_on:
      - backend
    networks:
      - emer-network

networks:
  emer-network:
    driver: bridge
